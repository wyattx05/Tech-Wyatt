
<!-- Site build date: {{ "now" | date: "%FT%T%z" }} -->
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      var savedTheme = null;
      var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

      try {
        savedTheme = localStorage.getItem("tech-wyatt-theme");
      } catch (error) {
        savedTheme = null;
      }

      var theme = savedTheme || (systemDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <!-- Begin SEO -->
  {% seo %}
  <!-- End SEO -->

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" type="text/css" href="{{ "/css/override.css" | relative_url }}">
  <script src="{{ "/js/theme-toggle.js" | relative_url }}" defer></script>

</head>
