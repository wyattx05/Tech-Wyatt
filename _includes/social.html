<link id="fa-stylesheet" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.0.0/css/all.min.css">

<ul class="social-media-list personal-links">
{%- for entry in site.minima.social_links -%}
  <li>
    <a rel="me noopener noreferrer" href="{{ entry.url }}" target="_blank" title="{{ entry.title }}">
      {%- if entry.icon == "briefcase" -%}
        <span class="grey fa-solid fa-{{ entry.icon }} fa-fw"></span>
      {%- else -%}
        <span class="grey fa-brands fa-{{ entry.icon }} fa-fw"></span>
      {%- endif -%}
      <span>{{ entry.title }}</span>
    </a>
  </li>
{%- endfor -%}
</ul>
